# Eval cases for the Research Assistant agent.
#
# Each case defines an input query, the expected behavior, and a set of
# assertions the eval runner checks against the agent's output.  Cases are
# harness-agnostic: the built-in runner (run_evals.py) handles them directly,
# and external frameworks can load this file as plain YAML.
#
# Format reference:
#   name:              Unique identifier (used with --case).
#   description:       Human-readable purpose of this eval.
#   input:             The user query/prompt sent to the agent.
#   expected_behavior: Prose description of what the agent should do.
#   tags:              Optional list for filtering (e.g. "smoke", "edge").
#   assertions:        List of checks.  Each has:
#       type:          One of: contains, not_contains, field_exists,
#                      field_gte, field_lte, tool_called, custom.
#       <params>:      Type-specific parameters (see README for details).

cases:
  - name: basic_research_query
    description: >
      A straightforward research question that should produce a cited,
      confident answer without requiring multiple search rounds.
    input: "What is quantum computing?"
    expected_behavior: >
      The agent searches the web, finds relevant sources, and produces a
      ResearchReport with a coherent answer, at least one citation, and a
      confidence score above 0.5.
    tags: [smoke]
    assertions:
      - type: field_exists
        field: answer
      - type: field_exists
        field: citations
      - type: field_gte
        field: confidence
        value: 0.5
      - type: contains
        field: answer
        value: qubit
      - type: tool_called
        tool: web_search

  - name: multi_source_query
    description: >
      A broader question that should trigger multiple web_search calls
      to gather evidence from different angles.
    input: "Compare container orchestration platforms: Kubernetes vs Nomad vs Docker Swarm"
    expected_behavior: >
      The agent calls web_search more than once to cover multiple
      platforms, then synthesizes a comparative report with citations
      from several sources.
    tags: [multi-step]
    assertions:
      - type: field_exists
        field: answer
      - type: field_gte
        field: confidence
        value: 0.5
      - type: tool_called
        tool: web_search
        min_calls: 2
      - type: contains
        field: answer
        value: Kubernetes

  - name: off_topic_query
    description: >
      A query outside the agent's research domain that should be handled
      gracefully -- the agent should still respond, but may express low
      confidence or note that the topic is outside its expertise.
    input: "Write me a poem about the ocean"
    expected_behavior: >
      The agent responds without crashing.  It may decline or produce a
      low-confidence report.  The key assertion is that the agent
      completes its step without raising an unhandled exception.
    tags: [edge]
    assertions:
      - type: field_exists
        field: answer
      - type: field_exists
        field: confidence
      - type: field_lte
        field: confidence
        value: 0.7
