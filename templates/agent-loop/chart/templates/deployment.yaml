apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-template.fullname" . }}
  labels:
    {{- include "agent-template.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent-template.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods on ConfigMap changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "agent-template.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            # Agent writes temp files (logs, MCP state), so root fs
            # is writable by default.  Uncomment if the image supports
            # a fully read-only root filesystem with emptyDir mounts.
            # readOnlyRootFilesystem: true
          envFrom:
            - configMapRef:
                name: {{ include "agent-template.fullname" . }}-config
          {{- if or .Values.env .Values.sandbox.enabled .Values.llm_adapter.enabled .Values.files.enabled }}
          env:
            {{- if .Values.env }}
            {{- toYaml .Values.env | nindent 12 }}
            {{- end }}
            {{- if .Values.sandbox.enabled }}
            - name: SANDBOX_URL
              value: "http://localhost:8000"
            {{- end }}
            {{- if .Values.llm_adapter.enabled }}
            - name: LLM_ADAPTER_URL
              value: "http://localhost:8081/v1"
            {{- end }}
            {{- if and .Values.files.enabled .Values.files.virusScanner.enabled }}
            # When the ClamAV sidecar is enabled, point the agent's
            # HttpScanner at it. The sidecar's HTTP shim is expected
            # to expose the {infected, viruses} JSON contract on
            # /scan over localhost:8088.
            - name: FILES_SCANNER_URL
              value: "http://localhost:8088/scan"
            - name: FILES_SCANNER_FAIL_MODE
              value: {{ .Values.files.virusScanner.failMode | quote }}
            {{- end }}
            {{- if .Values.files.enabled }}
            - name: FILES_ENABLED
              value: "true"
            {{- if .Values.files.backend }}
            - name: FILES_BACKEND
              value: {{ .Values.files.backend | quote }}
            {{- end }}
            {{- if .Values.files.maxSizeBytes }}
            - name: FILES_MAX_SIZE_BYTES
              value: {{ .Values.files.maxSizeBytes | quote }}
            {{- end }}
            {{- if .Values.files.persistence.enabled }}
            # Override the in-image bytes_dir default so SqliteFileStore /
            # PostgresFileStore write file bytes to the mounted PVC. Without
            # this the agent would write to ephemeral container storage and
            # bytes would be lost on every pod restart.
            - name: FILES_BYTES_DIR
              value: {{ .Values.files.persistence.mountPath | quote }}
            {{- if or (eq .Values.files.backend "sqlite") (eq .Values.files.backend "") }}
            # Co-locate the SqliteFileStore metadata DB on the same PVC.
            # PR #130 fixed bytes persistence; without this, metadata
            # still lives in storage.sqlite_path (typically /tmp/agent.db)
            # and is wiped on pod restart, leaving uploaded bytes
            # orphaned (404 on subsequent GET /v1/files/{id}). Postgres
            # backend is unaffected — its metadata is in the database.
            - name: FILES_SQLITE_DB_PATH
              value: {{ printf "%s/.metadata/agent.db" .Values.files.persistence.mountPath | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if and .Values.files.enabled .Values.files.persistence.enabled }}
          volumeMounts:
            - name: files-bytes
              mountPath: {{ .Values.files.persistence.mountPath | quote }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
        {{- if .Values.sandbox.enabled }}
        - name: sandbox
          image: "{{ .Values.sandbox.image.repository }}:{{ .Values.sandbox.image.tag }}"
          imagePullPolicy: {{ .Values.sandbox.image.pullPolicy }}
          ports:
            - name: sandbox
              containerPort: 8000
              protocol: TCP
          env:
            - name: SANDBOX_PROFILE
              value: {{ .Values.sandbox.profile | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            {{- if .Values.sandbox.seccomp.enabled }}
            seccompProfile:
              type: Localhost
              localhostProfile: operator/{{ include "agent-template.fullname" . }}-sandbox.json
            {{- end }}
          resources:
            {{- toYaml .Values.sandbox.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: sandbox-tmp
              mountPath: /tmp
        {{- end }}
        {{- if .Values.llm_adapter.enabled }}
        - name: llm-adapter
          image: "{{ .Values.llm_adapter.image.repository }}:{{ .Values.llm_adapter.image.tag }}"
          imagePullPolicy: {{ .Values.llm_adapter.image.pullPolicy }}
          ports:
            - name: adapter
              containerPort: 8081
              protocol: TCP
          env:
            - name: ADAPTER_PROVIDER
              value: {{ .Values.llm_adapter.provider | quote }}
          {{- if .Values.llm_adapter.secretRef.name }}
          envFrom:
            - secretRef:
                name: {{ .Values.llm_adapter.secretRef.name }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.llm_adapter.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 10
        {{- end }}
        {{- if and .Values.files.enabled .Values.files.virusScanner.enabled }}
        - name: clamav
          image: "{{ .Values.files.virusScanner.image.repository }}:{{ .Values.files.virusScanner.image.tag }}"
          imagePullPolicy: {{ .Values.files.virusScanner.image.pullPolicy }}
          # Two ports: 3310 (clamd INSTREAM) and 8088 (HTTP shim that
          # translates the framework's POST-bytes contract into clamd
          # commands). The reference image exposes both. If your image
          # only ships clamd, deploy a small sidecar in front (eg
          # tiangolo/uvicorn-gunicorn-fastapi) that POSTs to clamd.
          ports:
            - name: clamd
              containerPort: 3310
              protocol: TCP
            - name: clamd-http
              containerPort: 8088
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.files.virusScanner.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 60        # signature DB load is slow
            periodSeconds: 60
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3310
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
          {{- if .Values.files.virusScanner.persistence.enabled }}
          volumeMounts:
            - name: clamav-db
              mountPath: /var/lib/clamav
          {{- end }}
        {{- end }}
      {{- if or .Values.sandbox.enabled (and .Values.files.enabled .Values.files.persistence.enabled) (and .Values.files.enabled .Values.files.virusScanner.enabled .Values.files.virusScanner.persistence.enabled) }}
      volumes:
        {{- if .Values.sandbox.enabled }}
        - name: sandbox-tmp
          emptyDir:
            sizeLimit: 10Mi
        {{- end }}
        {{- if and .Values.files.enabled .Values.files.persistence.enabled }}
        - name: files-bytes
          persistentVolumeClaim:
            claimName: {{ include "agent-template.fullname" . }}-files-bytes
        {{- end }}
        {{- if and .Values.files.enabled .Values.files.virusScanner.enabled .Values.files.virusScanner.persistence.enabled }}
        - name: clamav-db
          persistentVolumeClaim:
            claimName: {{ include "agent-template.fullname" . }}-clamav-db
        {{- end }}
      {{- end }}
