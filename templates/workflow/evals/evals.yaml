# Eval cases for the workflow template.
#
# *** STARTER EXAMPLES — replace these when you run /exercise-agent ***
#
# /exercise-agent reads your workflow's implementation and generates real eval
# cases tailored to your nodes, edges, state model, and tools.
# The cases below are illustrative placeholders to show the format.
#
# Format reference:
#   name:              Unique identifier (used with --case).
#   description:       Human-readable purpose of this eval.
#   input:             The initial state field values for the workflow.
#   expected_behavior: Prose description of what the workflow should do.
#   tags:              Optional list for filtering (e.g. "smoke", "edge", "multi-step").
#   assertions:        List of checks.  Each has:
#       type:          One of: contains, not_contains, field_exists, field_equals,
#                      field_gte, field_lte, tool_called, custom.
#       field:         State field to inspect (for field_* and contains types).
#       value:         Expected value or threshold.
#       tool:          Tool name (for tool_called type).
#       min_calls:     Minimum invocation count (for tool_called type, optional).

cases:
  - name: basic_happy_path
    description: >
      A typical request that flows from the entry node to END and writes
      something to the output field. Replace with a real smoke-test
      scenario for your workflow.
    input: "Example input for the workflow"
    expected_behavior: >
      The workflow runs through every node in the happy-path route and
      ends with the output field populated.
    tags: [smoke]
    assertions:
      # Replace 'result' with the output field on your state model.
      - type: field_exists
        field: result
