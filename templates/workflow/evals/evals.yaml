# Eval cases for the workflow template.
#
# *** STARTER EXAMPLES — replace these when you run /exercise-agent ***
#
# /exercise-agent reads your workflow's implementation and generates real eval
# cases tailored to your nodes, edges, state model, and tools.
# The cases below are illustrative placeholders to show the format.
#
# Format reference:
#   name:              Unique identifier (used with --case).
#   description:       Human-readable purpose of this eval.
#   input:             The initial state field values for the workflow.
#   expected_behavior: Prose description of what the workflow should do.
#   tags:              Optional list for filtering (e.g. "smoke", "edge", "multi-step").
#   assertions:        List of checks.  Each has:
#       type:          One of: contains, not_contains, field_exists, field_equals,
#                      field_gte, field_lte, tool_called, custom.
#       field:         State field to inspect (for field_* and contains types).
#       value:         Expected value or threshold.
#       tool:          Tool name (for tool_called type).
#       min_calls:     Minimum invocation count (for tool_called type, optional).

cases:
  - name: simple_query_direct_summarize
    description: >
      A short query (10 words or fewer) should be classified as "simple"
      and routed directly to the summarize node, skipping research.
    input: "What is quantum computing?"
    expected_behavior: >
      The classify node marks complexity as "simple". The workflow skips
      the research node and goes directly to summarize. The final state
      has a non-empty summary and empty research_results.
    tags: [smoke]
    assertions:
      - type: field_equals
        field: complexity
        value: "simple"
      - type: field_exists
        field: summary

  - name: complex_query_full_pipeline
    description: >
      A longer query (more than 10 words) should be classified as
      "complex" and routed through research before summarization.
    input: "Explain the applications of quantum computing in modern cryptography and how it affects current encryption standards"
    expected_behavior: >
      The classify node marks complexity as "complex". The workflow
      routes through the research node (which may call tools) and then
      to the summarize node. The final state has non-empty
      research_results and summary.
    tags: [smoke, multi-step]
    assertions:
      - type: field_equals
        field: complexity
        value: "complex"
      - type: field_exists
        field: research_results
      - type: field_exists
        field: summary

  - name: minimal_input
    description: >
      A single-word query should still complete without errors,
      classified as "simple" and summarized directly.
    input: "Kubernetes"
    expected_behavior: >
      The workflow completes gracefully with a simple classification
      and a summary produced from the raw query.
    tags: [edge]
    assertions:
      - type: field_equals
        field: complexity
        value: "simple"
      - type: field_exists
        field: summary
