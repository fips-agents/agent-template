# MemoryHub SDK config for the demo chat agent.
# Both fields use ${VAR:-default} env-var substitution performed by
# server.py's _materialize_memoryhub_config() at startup. The MemoryHub
# SDK itself does not do env-var expansion; the server rewrites this
# file in place before BaseAgent reads it.
server_url: "${MEMORYHUB_URL:-https://memory-hub-mcp-memory-hub-mcp.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com/mcp/}"
api_key: "${MEMORYHUB_API_KEY}"

memory_loading:
  mode: focused
  pattern: lazy

retrieval_defaults:
  max_results: 10
  max_response_tokens: 4000
  default_mode: full
