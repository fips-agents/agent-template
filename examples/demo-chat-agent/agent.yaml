# Demo Chat Agent — configuration
#
# Points at the second gpt-oss-20b vLLM deployment on the workshop
# cluster (n7pd5). MemoryHub is wired via the SDK path: self.memory in
# the agent code calls write/search; the LLM does not see memory tools
# directly. The .memoryhub.yaml file in this directory carries the
# server URL and API key.

model:
  endpoint: ${MODEL_ENDPOINT:-https://gpt-oss-20b-2-gpt-oss-model-2.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com/v1}
  name: ${MODEL_NAME:-openai/RedHatAI/gpt-oss-20b}
  temperature: 0.3
  max_tokens: 2048

# No MCP servers — memory comes through the SDK (see memory: section).
mcp_servers: []

tools:
  local_dir: ./tools
  visibility_default: agent_only

prompts:
  dir: ./prompts

loop:
  max_iterations: ${MAX_ITERATIONS:-20}

logging:
  level: ${LOG_LEVEL:-INFO}

# Memory backend. Auto-detects when .memoryhub.yaml is present, but we
# pin it explicitly so misconfiguration fails loudly instead of silently
# falling back to NullMemoryClient.
memory:
  backend: ${MEMORY_BACKEND:-memoryhub}
  config_path: .memoryhub.yaml
