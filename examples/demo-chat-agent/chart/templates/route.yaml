{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "demo-chat-agent.fullname" . }}
  labels:
    {{- include "demo-chat-agent.labels" . | nindent 4 }}
  annotations:
    # LLM calls can exceed the default 30s HAProxy timeout, especially on
    # first-token latency with a cold model. Bump to 2m.
    haproxy.router.openshift.io/timeout: 120s
spec:
  to:
    kind: Service
    name: {{ include "demo-chat-agent.fullname" . }}
  port:
    targetPort: http
  tls:
    termination: {{ .Values.route.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.route.tls.insecureEdgeTerminationPolicy }}
{{- end }}
