# Helm values override for deploying code-sandbox-agent to the RHPDS cluster.
# Usage: helm install code-sandbox-agent ../../templates/agent-loop/chart \
#          -f values-deploy.yaml -n code-sandbox-agent

image:
  repository: image-registry.openshift-image-registry.svc:5000/code-sandbox-agent/code-sandbox-agent
  tag: latest
  pullPolicy: Always

config:
  MODEL_ENDPOINT: "https://gpt-oss-20b-gpt-oss-model.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com/v1"
  MODEL_NAME: "openai/RedHatAI/gpt-oss-20b"
  LOG_LEVEL: "INFO"
  OPENAI_API_KEY: "not-required"

probes:
  enabled: true

route:
  enabled: true

sandbox:
  enabled: true
  image:
    repository: image-registry.openshift-image-registry.svc:5000/code-sandbox-agent/code-sandbox
    tag: latest
    pullPolicy: Always
