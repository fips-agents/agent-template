# Helm values override for deploying gemma-tool-calling to OpenShift.
# Usage: helm upgrade --install gemma-tool-calling ../../templates/agent-loop/chart \
#          -f values-deploy.yaml -n <PROJECT>

image:
  # Populated by Makefile — points to the internal registry image built by BuildConfig.
  repository: SET_BY_MAKEFILE
  tag: latest
  pullPolicy: Always

config:
  # Gemma 4 E4B-it served via vLLM with --tool-call-parser=gemma4
  MODEL_ENDPOINT: "http://gemma-4-e4b-it-predictor.gemma-model.svc.cluster.local/v1"
  MODEL_NAME: "hosted_vllm//mnt/models"
  LOG_LEVEL: "INFO"
  OPENAI_API_KEY: "not-required"

probes:
  enabled: true

route:
  enabled: true
