# Gemma 4 Tool Calling — configuration
#
# Exercises Gemma 4's native tool calling on the FIPS-RHOAI cluster.
# vLLM serves Gemma 4 E4B-it with --tool-call-parser=gemma4, which
# translates native <|tool_call> tokens into standard OpenAI tool_calls.
# LiteLLM sees a normal OpenAI-compatible endpoint — no adapter needed.

model:
  endpoint: ${MODEL_ENDPOINT:-http://gemma-4-e4b-it-predictor.gemma-model.svc.cluster.local/v1}
  name: ${MODEL_NAME:-hosted_vllm/google/gemma-4-e4b-it}
  temperature: 0.3
  max_tokens: 2048

mcp_servers:
  - url: ${TAVILY_MCP_URL:-https://mcp-server-cdc-tavily-restricted-mcp.apps.cluster-n7pd5.n7pd5.sandbox5167.opentlc.com/mcp/}

tools:
  local_dir: ./tools
  visibility_default: llm_only

prompts:
  dir: ./prompts

loop:
  max_iterations: ${MAX_ITERATIONS:-10}

logging:
  level: ${LOG_LEVEL:-INFO}

memory:
  backend: "null"
