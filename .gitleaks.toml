# Project-level gitleaks config. Run from the repo root so this file is
# auto-discovered:
#
#   gitleaks detect --no-banner --redact
#
# When invoking from a subdirectory or CI runner that uses a different
# working directory, pass the config explicitly:
#
#   gitleaks detect --source <repo-root> --config <repo-root>/.gitleaks.toml
#
# Running from a subdirectory without --config silently skips the
# allowlist and surfaces test-fixture fakes in test_tool_inspector.py /
# test_guardrails.py as false positives.

[allowlist]
  description = "Project-specific allowlist for false positives"

  paths = [
    '''\/examples\/''',
    '''\/tests?\/fixtures\/''',
    '''docs\/.*\.md$''',
    # Security test suites contain fake secrets as inputs to the pattern
    # detectors they exercise. Removing the fakes defeats the tests.
    '''sandbox\/tests\/test_guardrails\.py$''',
    '''packages\/fipsagents\/tests\/test_tool_inspector\.py$''',
    # Smoke harnesses include placeholder bearer tokens / auth headers
    # in curl examples. Real credentials come from the operator's env at
    # run time; the embedded values are documentation, not secrets.
    '''^scripts\/smoke-.*\.sh$''',
  ]

  regexes = [
    '''REDACTED''',
    '''YOUR_.*_HERE''',
    '''<your-.*-here>''',
    '''REPLACE_WITH_YOUR''',
  ]
