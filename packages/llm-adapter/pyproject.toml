[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "llm-adapter"
version = "0.1.0"
description = "Sidecar that translates OpenAI-compatible requests to provider-native APIs (Anthropic, Bedrock, Azure, Vertex AI)"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.11"
authors = [
    {name = "Red Hat AI Americas"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Framework :: AsyncIO",
    "Operating System :: OS Independent",
]
keywords = ["llm", "adapter", "sidecar", "openai", "anthropic", "vertex", "gemini"]
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pydantic>=2.0",
    "httpx",
    "anthropic[bedrock]>=0.40",
    "openai>=1.40.0",
    "google-genai>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
    "pytest-cov",
    "ruff",
]

[project.urls]
Homepage = "https://github.com/fips-agents/agent-template"
Repository = "https://github.com/fips-agents/agent-template"
Issues = "https://github.com/fips-agents/agent-template/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
